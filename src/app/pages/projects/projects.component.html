<div class="projects-grid">
  <div *ngFor="let project of projects" class="flex justify-content-center">
    <p-fieldset [legend]="project.name" >
      <span>{{ project.description }}</span>

      <div class="footer">
        <button class="project-btn">
          <i class="pi pi-globe"></i>
          <a [href]="project.link" target="_blank">Acessar Projeto</a>
        </button>
      </div>
    </p-fieldset>
  </div>
</div>
