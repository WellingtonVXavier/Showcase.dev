<div class="projects-grid">
  <div *ngFor="let project of projects" class="flex justify-content-center">
    <p-fieldset [legend]=" project.name" [toggleable]="true">

      <p class="description">
        {{ project.description }}
      </p>

      <div class="footer">
        <a [href]="project.link" target="_blank" class="project-btn">
          <i class="pi pi-globe"></i>
          Acessar Projeto
        </a>
      </div>

    </p-fieldset>
  </div>
</div>
