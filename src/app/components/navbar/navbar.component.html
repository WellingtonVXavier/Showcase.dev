<div class="card">
  <p-tabMenu 
    [model]="items"
    [(activeItem)]="activeItem"
    class="menu-centralizado"
    />
</div>

<div class="card slider">
  <app-home *ngIf="activeItem?.id === 'home'"></app-home>
  <app-sobre *ngIf="activeItem?.id === 'sobre'"></app-sobre>
  <app-projects *ngIf="activeItem?.id === 'projetos'"></app-projects>
</div>
